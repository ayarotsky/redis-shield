name: CI

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main

env:
  RUST_BACKTRACE: "1"
  CARGO_REGISTRIES_CRATES_IO_PROTOCOL: sparse

concurrency:
  group: ${{ github.workflow }}-${{ github.head_ref || github.run_id }}
  cancel-in-progress: true

permissions:
  contents: read
  pull-requests: write

jobs:
  commitlint:
    runs-on: ubuntu-latest
    if: github.ref != 'refs/heads/main'
    steps:
      - uses: actions/checkout@v7
        with:
          fetch-depth: 0

      - uses: wagoid/commitlint-github-action@v6

  linters:
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - uses: actions/checkout@v7

      - name: Install rust toolchain
        uses: actions-rust-lang/setup-rust-toolchain@v1
        with:
          cache-key: ${{ runner.os }}-cargo-${{ hashFiles('rust-toolchain.toml') }}-${{ hashFiles('Cargo.lock') }}
          components: clippy, rustfmt

      - name: Install just and cargo tools
        uses: taiki-e/install-action@v2
        with:
          tool: just,cargo-deny

      - run: just lint

  tests-redis:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    strategy:
      matrix:
        redis-version: ["7.x", "8.x"]
    steps:
      - uses: actions/checkout@v7

      - name: Install rust toolchain
        uses: actions-rust-lang/setup-rust-toolchain@v1
        with:
          cache-key: ${{ runner.os }}-cargo-${{ hashFiles('rust-toolchain.toml') }}-${{ hashFiles('Cargo.lock') }}

      - name: Install just
        uses: taiki-e/install-action@v2
        with:
          tool: just

      - name: Build SHIELD module
        run: cargo build

      - name: Start Redis with SHIELD module
        uses: shogo82148/actions-setup-redis@v1
        with:
          redis-version: ${{ matrix.redis-version }}
          redis-port: "34567"
          redis-conf: |
            loadmodule ${{ github.workspace }}/target/debug/libredis_shield.so

      - name: Run tests
        run: just test

  tests-valkey:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    strategy:
      matrix:
        redis-version: ["7.x", "8.x"]
    steps:
      - uses: actions/checkout@v7

      - name: Install rust toolchain
        uses: actions-rust-lang/setup-rust-toolchain@v1
        with:
          cache-key: ${{ runner.os }}-cargo-${{ hashFiles('rust-toolchain.toml') }}-${{ hashFiles('Cargo.lock') }}

      - name: Install just
        uses: taiki-e/install-action@v2
        with:
          tool: just

      - name: Build SHIELD module
        run: cargo build

      - name: Start Valkey with SHIELD module
        uses: shogo82148/actions-setup-redis@v1
        with:
          distribution: valkey
          redis-version: ${{ matrix.redis-version }}
          redis-port: "34567"
          redis-conf: |
            loadmodule ${{ github.workspace }}/target/debug/libredis_shield.so

      - name: Run tests
        run: just test

  build-test:
    needs: [tests-redis, tests-valkey]
    timeout-minutes: 10
    strategy:
      fail-fast: false
      matrix:
        include:
          - target: x86_64-unknown-linux-gnu
            os: ubuntu-latest
          - target: x86_64-apple-darwin
            os: macos-latest
          - target: aarch64-apple-darwin
            os: macos-latest
          - target: aarch64-unknown-linux-gnu
            os: ubuntu-latest
            cross: true
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v7

      - name: Setup cross-compilation toolchain
        if: matrix.cross
        uses: taiki-e/setup-cross-toolchain-action@v1
        with:
          target: ${{ matrix.target }}

      - name: Install rust toolchain
        uses: actions-rust-lang/setup-rust-toolchain@v1
        with:
          cache-key: ${{ runner.os }}-${{ matrix.target }}-cargo-${{ hashFiles('rust-toolchain.toml') }}-${{ hashFiles('Cargo.lock') }}
          target: ${{ matrix.target }}

      - name: Build library
        run: cargo build --target ${{ matrix.target }}
