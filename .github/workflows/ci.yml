name: CI

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main

env:
  RUST_BACKTRACE: "1"
  CARGO_REGISTRIES_CRATES_IO_PROTOCOL: sparse

concurrency:
  group: ${{ github.workflow }}-${{ github.head_ref || github.run_id }}
  cancel-in-progress: true

permissions:
  contents: read
  pull-requests: write

jobs:
  linters:
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - uses: actions/checkout@v6

      - name: Install rust toolchain
        uses: actions-rust-lang/setup-rust-toolchain@v1
        with:
          cache-key: ${{ runner.os }}-cargo-${{ hashFiles('rust-toolchain.toml') }}-${{ hashFiles('Cargo.lock') }}
          components: clippy, rustfmt

      - name: Install just and cargo tools
        uses: taiki-e/install-action@v2
        with:
          tool: just,cargo-deny

      - run: just lint

  tests-redis:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v6

      - name: Install rust toolchain
        uses: actions-rust-lang/setup-rust-toolchain@v1
        with:
          cache-key: ${{ runner.os }}-cargo-${{ hashFiles('rust-toolchain.toml') }}-${{ hashFiles('Cargo.lock') }}

      - name: Install just
        uses: taiki-e/install-action@v2
        with:
          tool: just

      - name: Build SHIELD module
        run: cargo build

      - name: Start Redis with SHIELD module
        uses: shogo82148/actions-setup-redis@v1
        with:
          redis-version: "8.x"
          redis-port: "34567"
          redis-conf: |
            loadmodule ${{ github.workspace }}/target/debug/libredis_shield.so

      - name: Run tests
        run: just test

  tests-valkey:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v6

      - name: Install rust toolchain
        uses: actions-rust-lang/setup-rust-toolchain@v1
        with:
          cache-key: ${{ runner.os }}-cargo-${{ hashFiles('rust-toolchain.toml') }}-${{ hashFiles('Cargo.lock') }}

      - name: Install just
        uses: taiki-e/install-action@v2
        with:
          tool: just

      - name: Build SHIELD module
        run: cargo build

      - name: Start Valkey with SHIELD module
        uses: shogo82148/actions-setup-redis@v1
        with:
          distribution: valkey
          redis-version: "8.x"
          redis-port: "34567"
          redis-conf: |
            loadmodule ${{ github.workspace }}/target/debug/libredis_shield.so

      - name: Run tests
        run: just test

  commitlint:
    runs-on: ubuntu-latest
    if: github.ref != 'refs/heads/main'
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - uses: wagoid/commitlint-github-action@v6
