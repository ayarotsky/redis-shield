name: CI

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main

env:
  RUST_BACKTRACE: "1"
  CARGO_REGISTRIES_CRATES_IO_PROTOCOL: sparse

concurrency:
  group: ${{ github.workflow }}-${{ github.head_ref || github.run_id }}
  cancel-in-progress: true

permissions:
  contents: read
  pull-requests: write

jobs:
  tests:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v6

      - name: Install redis
        uses: shogo82148/actions-setup-redis@v1
        with:
          redis-version: "7.x"

      - name: Install rust toolchain
        uses: actions-rust-lang/setup-rust-toolchain@v1
        with:
          cache-key: ${{ runner.os }}-cargo-${{ hashFiles('rust-toolchain.toml') }}-${{ hashFiles('Cargo.lock') }}
          components: clippy, rustfmt

      - name: Install just and cargo tools
        uses: taiki-e/install-action@v2
        with:
          tool: just,cargo-deny,cargo-audit,cargo-auditable,cargo-pants

      - name: Lint
        run: just lint

      - name: Build SHIELD module
        run: just build

      - name: Start Redis with SHIELD module
        run: just redis-up

      - name: Run tests
        run: just test

      - name: Audit dependencies
        run: just audit

  commitlint:
    runs-on: ubuntu-latest
    if: github.ref != 'refs/heads/main'
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - uses: wagoid/commitlint-github-action@v6
